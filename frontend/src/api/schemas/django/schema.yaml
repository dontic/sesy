components:
  schemas:
    AudienceMember:
      type: object
      properties:
        pk:
          type: integer
          readOnly: true
          title: ID
        email:
          type: string
          format: email
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        subscribed:
          type: boolean
        tags:
          type: array
          items:
            type: integer
        tags_detail:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - pk
      - tags_detail
      - updated_at
    AudienceMemberCsvUploadRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
      required:
      - file
    AudienceMemberRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        subscribed:
          type: boolean
        tags:
          type: array
          items:
            type: integer
      required:
      - email
    Campaign:
      type: object
      properties:
        pk:
          type: integer
          readOnly: true
          title: ID
        name:
          type: string
          maxLength: 255
        from_email:
          type: string
          format: email
          maxLength: 254
        from_name:
          type: string
          maxLength: 255
        template:
          type: integer
        template_detail:
          allOf:
          - $ref: '#/components/schemas/EmailTemplate'
          readOnly: true
        send_to_all:
          type: boolean
          description: Send to all audience members. If False, only send to members
            with the specified tags.
        tags:
          type: array
          items:
            type: integer
