components:
  schemas:
    ApiKey:
      type: object
      properties:
        pk:
          type: integer
          readOnly: true
          title: ID
        name:
          type: string
          maxLength: 100
        key:
          type: string
          readOnly: true
        created_by:
          type: string
          format: email
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - created_by
      - key
      - pk
      - updated_at
    ApiKeyRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
    AudienceMember:
      type: object
      properties:
        pk:
          type: integer
          readOnly: true
          title: ID
        email:
          type: string
          format: email
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        subscribed:
          type: boolean
        tags:
          type: array
          items:
            type: integer
        tags_detail:
          type: array
          items:
            $ref: '#/components/schemas/Tag'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - email
      - pk
      - tags_detail
      - updated_at
    AudienceMemberCsvUploadRequest:
      type: object
      properties:
        file:
          type: string
          format: binary
      required:
      - file
    AudienceMemberRequest:
      type: object
      properties:
        email:
          type: string
          format: email
          minLength: 1
          maxLength: 254
        first_name:
          type: string
          maxLength: 150
        last_name:
          type: string
          maxLength: 150
        subscribed:
          type: boolean
        tags:
          type: array
          items:
            type: integer
      required:
      - email
    Campaign:
      type: object
      properties:
        pk:
          type: integer
          readOnly: true
          title: ID
        name:
          type: string
