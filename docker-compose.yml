name: sesy


# Shared configuration for Django-based services (web server + worker + beat).
x-django-app: &django-app
  restart: unless-stopped
  image: dontic/sesy-backend:latest
  environment: &django-env
    # ── Django Core ──────────────────────────────────────────────────────
    DJANGO_SECRET_KEY: change-me
    DOMAIN: sesy.mydomain.com
    # ── PostgreSQL (internal defaults — no need to change unless using an external PostgreSQL server) ───────────────
    POSTGRES_DB_NAME: django
    POSTGRES_USER: django
    POSTGRES_PASSWORD: django
    POSTGRES_HOST: postgres
    POSTGRES_PORT: "5432"
    # ── Redis (internal defaults — no need to change unless using an external Redis server) ────────────────────
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    REDIS_DB: 0
  volumes:
    # Media files volume — shared across all Django services
    - media:/app/backend/media
    - django_static:/app/backend/django_static

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  # Primary relational database for the application.
  # Data is stored in a named volume.
  # Comment out this service if using an external PostgreSQL server.
  postgres:
    restart: unless-stopped
    image: postgres:16-bullseye
    environment:
      POSTGRES_DB: django
      POSTGRES_USER: django
      POSTGRES_PASSWORD: django
    volumes:
      - postgresdata:/var/lib/postgresql/data
    # Uncomment to expose PostgreSQL port for external access (e.g., DB GUI tools)
    # ports:
    #   - "5432:5432"

  # ---------------------------------------------------------------------------
  # Redis Cache & Message Broker
  # ---------------------------------------------------------------------------
  # In-memory store used as cache backend and Celery message broker.
  # Comment out this service if using an external Redis server.
  redis:
    restart: unless-stopped
    image: redis:7.2.0-alpine
    # Uncomment to expose Redis port for external access
    # ports:
    #   - "6379:6379"

  # ---------------------------------------------------------------------------
  # Django Web Application
  # ---------------------------------------------------------------------------
  # Main application server (Gunicorn). Handles HTTP requests, REST API,
  # and runs migrations + static file collection on startup.
  django:
    <<: *django-app
    entrypoint: /app/backend/docker/entrypoint-django.sh
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/ht/startup-probe/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Celery Worker
  # ---------------------------------------------------------------------------
  # Processes background tasks.
  worker:
    <<: *django-app
    entrypoint: /app/backend/docker/entrypoint-worker.sh
    depends_on:
      postgres:
        condition: service_started
      django:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    <<: *django-app
    entrypoint: /app/backend/docker/entrypoint-beat.sh
    depends_on:
      postgres:
        condition: service_started
      django:
        condition: service_healthy
      redis:
        condition: service_started


  frontend:
    restart: unless-stopped
    image: dontic/sesy-frontend:latest
    depends_on:
      - django

  # ---------------------------------------------------------------------------
  # Nginx Reverse Proxy
  # ---------------------------------------------------------------------------
  # Entry point for HTTP traffic. Proxies to Django and serves media files.
  # Config is defined inline below
  nginx:
    image: nginx:1.28
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - media:/app/backend/media:ro
      - django_static:/app/backend/django_static:ro
    configs:
      - source: nginx_conf
        target: /etc/nginx/nginx.conf
    depends_on:
      - django
      - frontend


# ---------------------------------------------------------------------------
# Nginx Configuration
# ---------------------------------------------------------------------------
configs:
  nginx_conf:
    content: |
      events {}

      http {
          include /etc/nginx/mime.types;

          server {
              listen 80;

              location / {
                  proxy_pass http://frontend:3000;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
              }

              location /api/ {
                  proxy_pass http://django:8000;
                  proxy_set_header Host $$host;
                  proxy_set_header X-Real-IP $$remote_addr;
                  proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $$scheme;
              }

              location /static/ {
                  alias /app/backend/django_static/;
                  autoindex off;
              }

              location /media/ {
                  alias /app/backend/media/;
                  autoindex off;
              }
          }
      }



volumes:
  postgresdata:
  media:
  django_static:



